backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: 'Add painting "{{slug}}"'
    update: 'Update painting "{{slug}}"'
    delete: 'Remove painting "{{slug}}"'
    uploadMedia: 'Upload image "{{path}}"'
    deleteMedia: 'Remove image "{{path}}"'

# Editorial workflow gives a "draft → in review → publish" flow.
# Comment this out if you want changes to publish immediately.
publish_mode: editorial_workflow

# Default media folder (only used by entries without their own override).
media_folder: src/assets/paintings
public_folder: /src/assets/paintings

site_url: https://example.com
display_url: https://example.com
logo_url: https://example.com/favicon.svg

collections:
  - name: settings
    label: Site settings
    delete: false
    editor:
      preview: false
    files:
      - name: site
        label: Contact & site info
        file: src/data/settings.json
        format: json
        fields:
          - { label: Artist name (full), name: artistName, widget: string }
          - { label: Artist name (short), name: artistShort, widget: string }
          - { label: Tagline, name: tagline, widget: string, hint: 'One short line shown in headers and SEO' }
          - { label: Site description, name: description, widget: text, hint: 'Used by search engines and social previews' }
          - { label: Studio location, name: location, widget: string, required: false }
          - { label: Contact email, name: email, widget: string, hint: 'Where the mailto: links point' }
          - { label: Instagram URL, name: instagram, widget: string, required: false }
          - { label: Site URL, name: url, widget: string, hint: 'Full https URL of the site' }

  - name: pages
    label: Pages
    delete: false
    editor:
      preview: false
    files:
      - name: about
        label: About page
        file: src/content/pages/about.md
        format: frontmatter
        fields:
          - { label: Eyebrow, name: eyebrow, widget: string, default: 'About' }
          - { label: Heading, name: heading, widget: string }
          - { label: Lede (intro paragraph), name: lede, widget: text, required: false }
          - label: Selected exhibitions
            name: exhibitions
            widget: list
            required: false
            fields:
              - { label: Year, name: year, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Venue, name: venue, widget: string }
          - { label: Contact section heading, name: contactHeading, widget: string, required: false, default: 'Contact' }
          - { label: Contact section blurb, name: contactBlurb, widget: text, required: false }
          - { label: Body, name: body, widget: markdown, required: false, hint: 'Biography paragraphs shown between the lede and the exhibitions list' }

      - name: contact
        label: Contact page
        file: src/content/pages/contact.md
        format: frontmatter
        fields:
          - { label: Eyebrow, name: eyebrow, widget: string, default: 'Inquire' }
          - { label: Heading, name: heading, widget: string }
          - { label: Lede, name: lede, widget: text, required: false }
          - { label: 'Direct email label', name: directLabel, widget: string, required: false, hint: 'Text before the email link, e.g. "Prefer email?"' }
          - { label: Submit button label, name: submitLabel, widget: string, required: false }
          - { label: Thank-you message, name: thanksMessage, widget: string, required: false }
          - { label: Body, name: body, widget: markdown, required: false }

  - name: paintings
    label: Paintings
    label_singular: Painting
    folder: src/content/paintings
    create: true
    slug: '{{slug}}'
    extension: mdx
    format: frontmatter
    # Per-collection media: paths are written relative to the MDX file,
    # which is what Astro's content collection `image()` loader expects.
    media_folder: '../../assets/paintings'
    public_folder: '../../assets/paintings'
    summary: '{{title}} ({{year}}) — {{status}}'
    sortable_fields: [order, year, title]
    view_groups:
      - label: Category
        field: category
      - label: Status
        field: status
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Year, name: year, widget: number, value_type: int, required: false, min: 1900, max: 2100 }
      - label: Category
        name: category
        widget: select
        default: canvas
        options:
          - { label: Canvas, value: canvas }
          - { label: Paper, value: paper }
      - { label: Medium, name: medium, widget: string, default: 'Acrylic on canvas' }
      - { label: Dimensions, name: dimensions, widget: string, required: false, hint: 'e.g. 30 × 30 cm' }
      - label: Status
        name: status
        widget: select
        default: available
        options:
          - { label: Available, value: available }
          - { label: Reserved, value: reserved }
          - { label: Sold, value: sold }
      - { label: Featured on homepage, name: featured, widget: boolean, default: false }
      - { label: Display order, name: order, widget: number, value_type: int, default: 0, hint: 'Lower numbers appear first' }
      - { label: Cover image, name: cover, widget: image, hint: 'High-quality JPEG works best' }
      - { label: Alt text, name: alt, widget: string, hint: 'Describe the image for screen readers and SEO' }
      - { label: Short description, name: description, widget: text, required: false }
      - { label: Tags, name: tags, widget: list, default: [], required: false }
      - { label: Body, name: body, widget: markdown, required: false, hint: 'Long-form description shown on the painting page' }
